services:
  telephony-webhook:
    build: .
    container_name: telephony-webhook
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - PORT=3100
      - DB_HOST=ai-postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=postgres
      - DOGRAH_API_URL=http://dograh-api:8000/api/v1
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - WEBHOOK_BASE_URL=https://iamazim.com
      - LOG_LEVEL=info
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  app-network:
    external: true
  db-network:
    external: true
