name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          for f in ai-infra/docker-compose.yaml dograh/docker-compose.yaml fazle-ai/docker-compose.yaml scripts/phase5-standalone.yaml; do
            echo "Validating $f..."
            docker compose -f "$f" config -q
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install -r requirements.txt 2>/dev/null || pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest

  deploy:
    name: Deploy to Production
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            echo "=== GitOps Deploy triggered by GitHub Actions ==="
            cd /home/azim/ai-call-platform
            git fetch origin && git reset --hard origin/main
            bash scripts/deploy.sh 2>&1
            echo "=== Deploy finished with exit code $? ==="
