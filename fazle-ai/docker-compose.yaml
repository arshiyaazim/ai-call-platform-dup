# ============================================================
# Fazle Personal AI System â€” All Fazle Services
# Intelligence layer integrated with Dograh voice platform
# ============================================================
# DEPLOY ORDER: 3 (start AFTER ai-infra)
# Usage: docker compose --env-file ../.env up -d
# ============================================================

services:
  # â”€â”€ Fazle API Gateway â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-api:
    build: ../fazle-system/api
    container_name: fazle-api
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      FAZLE_API_KEY: "${FAZLE_API_KEY:?FAZLE_API_KEY not set}"
      FAZLE_JWT_SECRET: "${FAZLE_JWT_SECRET:?FAZLE_JWT_SECRET not set}"
      FAZLE_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      FAZLE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_MEMORY_URL: "http://fazle-memory:8300"
      FAZLE_TASK_URL: "http://fazle-task-engine:8400"
      FAZLE_TOOLS_URL: "http://fazle-web-intelligence:8500"
      FAZLE_TRAINER_URL: "http://fazle-trainer:8600"
      FAZLE_LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY not set}"
      FAZLE_LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET not set}"
      FAZLE_LIVEKIT_URL: "${FAZLE_LIVEKIT_URL:-wss://livekit.iamazim.com}"
      FAZLE_LEARNING_ENGINE_URL: "http://fazle-learning-engine:8900"
      # Phase-5 Autonomous AI services
      FAZLE_AUTONOMY_ENGINE_URL: "http://fazle-autonomy-engine:9100"
      FAZLE_TOOL_ENGINE_URL: "http://fazle-tool-engine:9200"
      FAZLE_KNOWLEDGE_GRAPH_URL: "http://fazle-knowledge-graph:9300"
      FAZLE_AUTONOMOUS_RUNNER_URL: "http://fazle-autonomous-runner:9400"
      FAZLE_SELF_LEARNING_URL: "http://fazle-self-learning:9500"
      FAZLE_GUARDRAIL_URL: "http://fazle-guardrail-engine:9600"
      FAZLE_WORKFLOW_ENGINE_URL: "http://fazle-workflow-engine:9700"
      FAZLE_SOCIAL_ENGINE_URL: "http://fazle-social-engine:9800"
      FAZLE_REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/7"
      FAZLE_RATE_LIMIT_RPM: "${FAZLE_RATE_LIMIT_RPM:-120}"
      FAZLE_RATE_LIMIT_PER_IP_RPS: "${FAZLE_RATE_LIMIT_PER_IP_RPS:-10}"
      # Vision + MinIO
      FAZLE_OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      FAZLE_MINIO_ENDPOINT: "minio:9000"
      FAZLE_MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-}"
      FAZLE_MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-}"
      FAZLE_MINIO_BUCKET: "fazle-multimodal"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:8100:8100"
      - "127.0.0.1:8101:8100"
    depends_on:
      fazle-brain:
        condition: service_healthy
      fazle-memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - app-network
      - ai-network
      - db-network

  # â”€â”€ Fazle Brain â€” Core Reasoning Engine â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-brain:
    build: ../fazle-system/brain
    container_name: fazle-brain
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      LLM_PROVIDER: "${FAZLE_LLM_PROVIDER:-ollama}"
      LLM_MODEL: "${FAZLE_LLM_MODEL:-qwen2.5:1.5b}"
      OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      MEMORY_URL: "http://fazle-memory:8300"
      TOOLS_URL: "http://fazle-web-intelligence:8500"
      TASK_URL: "http://fazle-task-engine:8400"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/1"
      LLM_GATEWAY_URL: "http://fazle-llm-gateway:8800"
      LEARNING_ENGINE_URL: "http://fazle-learning-engine:8900"
      USE_LLM_GATEWAY: "true"
      # Phase-5 Autonomous AI services
      AUTONOMY_ENGINE_URL: "http://fazle-autonomy-engine:9100"
      TOOL_ENGINE_URL: "http://fazle-tool-engine:9200"
      KNOWLEDGE_GRAPH_URL: "http://fazle-knowledge-graph:9300"
      AUTONOMOUS_RUNNER_URL: "http://fazle-autonomous-runner:9400"
      SELF_LEARNING_URL: "http://fazle-self-learning:9500"
      # Voice fast mode & agent system
      VOICE_FAST_MODE: "${FAZLE_VOICE_FAST_MODE:-true}"
      VOICE_OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      VOICE_FAST_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      PERSONA_CACHE_TTL: "${PERSONA_CACHE_TTL:-300}"
      MEMORY_TOP_K: "${MEMORY_TOP_K:-2}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8200/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - db-network
      - app-network

  # â”€â”€ Fazle Memory â€” Vector Memory System â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-memory:
    build: ../fazle-system/memory
    container_name: fazle-memory
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      VECTOR_DB_URL: "http://qdrant:6333"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "text-embedding-3-small"
      EMBEDDING_PROVIDER: "ollama"
      EMBEDDING_FALLBACK: "openai"
      COLLECTION_NAME: "fazle_memories"
      MULTIMODAL_COLLECTION: "fazle_memories_multimodal"
      MULTIMODAL_EMBEDDING_DIM: "3072"
      MULTIMODAL_EMBEDDING_MODEL: "text-embedding-3-large"
      # MinIO for presigned URLs
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-}"
      MINIO_BUCKET: "fazle-multimodal"
      # Ollama embedding fallback
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
      OLLAMA_EMBEDDING_DIM: "768"
      # PostgreSQL for structured knowledge
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - db-network
      - app-network

  # â”€â”€ Fazle Task Engine â€” Scheduling & Automation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-task-engine:
    build: ../fazle-system/tasks
    container_name: fazle-task-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      FAZLE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_MEMORY_URL: "http://fazle-memory:8300"
      FAZLE_DOGRAH_API_URL: "http://dograh-api:8000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8400/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - app-network
      - db-network

  # â”€â”€ Fazle Web Intelligence â€” Search & Extraction â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-web-intelligence:
    build: ../fazle-system/tools
    container_name: fazle-web-intelligence
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      SERPER_API_KEY: "${SERPER_API_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      SEARCH_PROVIDER: "${FAZLE_SEARCH_PROVIDER:-serper}"
      MEMORY_URL: "http://fazle-memory:8300"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8500/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-network
      - app-network

  # â”€â”€ Fazle Trainer â€” Learning & Preference Extraction â”€â”€â”€â”€â”€â”€
  fazle-trainer:
    build: ../fazle-system/trainer
    container_name: fazle-trainer
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      LLM_PROVIDER: "${FAZLE_LLM_PROVIDER:-ollama}"
      LLM_MODEL: "${FAZLE_LLM_MODEL:-qwen2.5:1.5b}"
      OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      MEMORY_URL: "http://fazle-memory:8300"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/2"
      LLM_GATEWAY_URL: "http://fazle-llm-gateway:8800"
      USE_LLM_GATEWAY: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8600/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-network
      - app-network
      - db-network

  # â”€â”€ Fazle Voice Agent â€” LiveKit-based STT/TTS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-voice:
    build: ../fazle-system/voice
    container_name: fazle-voice
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - /home/azim/piper-voices:/models:ro
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      LIVEKIT_URL: "ws://livekit:7880"
      FAZLE_VOICE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_VOICE_TTS_VOICE: "${FAZLE_VOICE_TTS_VOICE:-alloy}"
      FAZLE_VOICE_TTS_ENGINE: "${FAZLE_VOICE_TTS_ENGINE:-piper}"
      FAZLE_VOICE_VOICE_MODEL: "${FAZLE_VOICE_VOICE_MODEL:-en_US-lessac-medium}"
      FAZLE_VOICE_VOICE_MODEL_DIR: "/models"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      ELEVENLABS_VOICE_ID: "${ELEVENLABS_VOICE_ID:-}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
        reservations:
          memory: 256M
    depends_on:
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, signal; os.kill(1, 0)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
      - ai-network
      - db-network

  # â”€â”€ Fazle UI â€” Next.js Control Dashboard â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-ui:
    build: ../frontend/fazle-dashboard
    container_name: fazle-ui
    restart: unless-stopped
    environment:
      FAZLE_API_URL: "http://fazle-api:8100"
      NEXTAUTH_URL: "${FAZLE_NEXTAUTH_URL:-https://fazle.iamazim.com}"
      NEXTAUTH_SECRET: "${FAZLE_JWT_SECRET:?FAZLE_JWT_SECRET not set}"
      PORT: "3020"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:3020:3020"
    depends_on:
      - fazle-api
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3020 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # â”€â”€ Fazle LLM Gateway â€” Centralized LLM Routing â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-llm-gateway:
    build: ../fazle-system/llm-gateway
    container_name: fazle-llm-gateway
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      LLM_PROVIDER: "${FAZLE_LLM_PROVIDER:-ollama}"
      LLM_MODEL: "${FAZLE_LLM_MODEL:-qwen2.5:1.5b}"
      OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/3"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      FALLBACK_PROVIDER: "${FAZLE_FALLBACK_PROVIDER:-openai}"
      FALLBACK_MODEL: "${FAZLE_FALLBACK_MODEL:-gpt-4o}"
      OLLAMA_TIMEOUT: "${FAZLE_OLLAMA_TIMEOUT:-10}"
      CACHE_TTL: "${FAZLE_CACHE_TTL:-300}"
      RATE_LIMIT_RPM: "${FAZLE_RATE_LIMIT_RPM:-60}"
      RATE_LIMIT_PER_USER_RPS: "${FAZLE_RATE_LIMIT_PER_USER_RPS:-10}"
      BATCH_WINDOW_MS: "${FAZLE_BATCH_WINDOW_MS:-75}"
      BATCH_MAX_SIZE: "${FAZLE_BATCH_MAX_SIZE:-4}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8800/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
      - app-network
      - db-network

  # â”€â”€ Fazle Learning Engine â€” Self-Improvement System â”€â”€â”€â”€â”€â”€â”€
  fazle-learning-engine:
    build: ../fazle-system/learning-engine
    container_name: fazle-learning-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/4"
      MEMORY_URL: "http://fazle-memory:8300"
      LLM_GATEWAY_URL: "http://fazle-llm-gateway:8800"
      TRAINER_URL: "http://fazle-trainer:8600"
      MIN_CONFIDENCE: "0.6"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-llm-gateway:
        condition: service_healthy
      fazle-memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8900/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - app-network
      - db-network

  # â”€â”€ Fazle Queue â€” Async Request Queue â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-queue:
    build: ../fazle-system/queue
    container_name: fazle-queue
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/5"
      STREAM_NAME: "llm_requests"
      RESULT_TTL: "600"
      MAX_STREAM_LEN: "10000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-llm-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8810/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
      - app-network
      - db-network

  # â”€â”€ Fazle Workers â€” LLM Request Worker Pool â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fazle-workers:
    build: ../fazle-system/workers
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/5"
      STREAM_NAME: "llm_requests"
      CONSUMER_GROUP: "llm_workers"
      LLM_GATEWAY_URL: "http://fazle-llm-gateway:8800"
      QUEUE_URL: "http://fazle-queue:8810"
      BATCH_SIZE: "5"
      BLOCK_MS: "2000"
      MAX_RETRIES: "3"
      CLAIM_MIN_IDLE_MS: "60000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      fazle-queue:
        condition: service_healthy
      fazle-llm-gateway:
        condition: service_healthy
    healthcheck:
