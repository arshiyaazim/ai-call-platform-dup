# ============================================================
# Prometheus Configuration — AI Voice Agent Platform
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── Alert rules ────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  # ── Host metrics via Node Exporter ─────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "vps-contabo"

  # ── Container metrics via cAdvisor ─────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    metric_relabel_configs:
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [name]
        target_label: container

  # ── Prometheus self-monitoring ─────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Loki metrics ──────────────────────────────────────────
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # ── Fazle API Gateway ────────────────────────────────────
  - job_name: "fazle-api"
    static_configs:
      - targets: ["fazle-api:8100"]
        labels:
          service: "fazle-api"
