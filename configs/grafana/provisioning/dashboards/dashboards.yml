# ============================================================
# Grafana Dashboard Provisioning
# Phase 8: Alerting & Dashboards
# ============================================================

apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: "AI Call Platform"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
