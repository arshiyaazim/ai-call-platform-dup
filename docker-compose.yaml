# ============================================================
# AI Voice Agent SaaS Platform — Production Docker Compose
# Domain: iamazim.com | VPS: 5.189.131.48
# ============================================================
# Services: Dograh API, Dograh UI, PostgreSQL (pgvector),
#           Redis, MinIO, LiveKit, Coturn, Cloudflared,
#           Fazle AI System, Monitoring (Prometheus/Grafana),
#           Logging (Loki/Promtail)
# ============================================================

services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db-network

  # ── Cache / Pub-Sub ──────────────────────────────────────
  redis:
    image: redis:8.0.2-alpine
    container_name: ai-redis
    restart: always
    command: >
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD not set}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - db-network

  # ── Object Storage ───────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY not set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY not set}
      MINIO_API_CORS_ALLOW_ORIGIN: "https://iamazim.com,https://fazle.iamazim.com"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

  # ── LiveKit — Real-time WebRTC Audio Streaming ───────────
  livekit:
    image: livekit/livekit-server:v1.8.2
    container_name: livekit
    restart: always
    entrypoint: ["/bin/sh", "/etc/livekit-entrypoint.sh"]
    command: []
    volumes:
      - ./configs/livekit/livekit.yaml:/etc/livekit-template.yaml:ro
      - ./scripts/livekit-entrypoint.sh:/etc/livekit-entrypoint.sh:ro
    environment:
      VPS_IP: ${VPS_IP:-5.189.131.48}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY not set}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET not set}
      LIVEKIT_WEBHOOK_URL: ${LIVEKIT_WEBHOOK_URL:-http://api:8000/api/v1/livekit/webhook}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    ports:
      - "127.0.0.1:7880:7880"        # HTTP API (proxied by Nginx)
      - "7881:7881"                    # RTC over TCP (direct)
      - "50000-50200:50000-50200/udp"  # WebRTC UDP media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7880 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network
      - db-network

  # ── Coturn — TURN/STUN for NAT Traversal ─────────────────
  coturn:
    image: coturn/coturn:4.6.2-r12-alpine
    container_name: coturn
    restart: always
    entrypoint: ["/bin/sh", "/etc/coturn-entrypoint.sh"]
    command: []
    volumes:
      - ./configs/coturn/turnserver.conf:/etc/coturn/turnserver-template.conf:ro
      - ./scripts/coturn-entrypoint.sh:/etc/coturn-entrypoint.sh:ro
      - /etc/letsencrypt/live/iamazim.com/fullchain.pem:/etc/coturn/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/iamazim.com/privkey.pem:/etc/coturn/certs/privkey.pem:ro
    user: root
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "3478:3478"          # STUN/TURN UDP
      - "3478:3478/udp"      # STUN/TURN UDP
      - "5349:5349"          # TURN TLS
      - "5349:5349/udp"      # TURN TLS UDP
      - "49152-49252:49152-49252/udp"  # Relay ports
    environment:
      TURN_SECRET: ${TURN_SECRET:?TURN_SECRET not set}
    healthcheck:
      test: ["CMD-SHELL", "netstat -tlnp | grep -q ':3478'"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  # ── Dograh API — FastAPI Backend (DO NOT MODIFY) ───────────
  api:
    image: ${REGISTRY:-dograhai}/dograh-api:${DOGRAH_API_VERSION:-1.0.0}
    container_name: dograh-api
    restart: always
    volumes:
      - shared-tmp:/tmp
      - ./personality:/app/personality:ro
    environment:
      ENVIRONMENT: "production"
      LOG_LEVEL: "INFO"
      BACKEND_API_ENDPOINT: "${BACKEND_API_ENDPOINT:-https://iamazim.com}"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379"
      ENABLE_AWS_S3: "false"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY not set}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:?MINIO_SECRET_KEY not set}"
      MINIO_BUCKET: "voice-audio"
      MINIO_SECURE: "false"
      FASTAPI_WORKERS: 2
      ENABLE_TRACING: "false"
      # TURN / LiveKit
      TURN_HOST: "${TURN_HOST:-turn.iamazim.com}"
      TURN_SECRET: "${TURN_SECRET:?TURN_SECRET not set}"
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY not set}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET not set}"
      LIVEKIT_WS_URL: "wss://livekit.iamazim.com"
      OSS_JWT_SECRET: "${OSS_JWT_SECRET:?OSS_JWT_SECRET not set}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
      - db-network

  # ── Dograh UI — Next.js Dashboard (DO NOT MODIFY) ────────
  ui:
    image: ${REGISTRY:-dograhai}/dograh-ui:${DOGRAH_UI_VERSION:-1.0.0}
    container_name: dograh-ui
    restart: always
    entrypoint: ["/bin/sh", "/app/scripts/ui-entrypoint.sh"]
    command: []
    volumes:
      - ./scripts/ui-entrypoint.sh:/app/scripts/ui-entrypoint.sh:ro
    environment:
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: "${BACKEND_URL:-http://api:8000}"
      BACKEND_API_ENDPOINT: "${BACKEND_API_ENDPOINT:-https://api.iamazim.com}"
      NODE_ENV: "oss"
      ENABLE_TELEMETRY: "false"
      PORT: "3010"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:3010:3010"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3010 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # ── Cloudflare Tunnel (optional fallback) ─────────────────
  cloudflared:
    image: cloudflare/cloudflared:2024.10.1
    container_name: cloudflared-tunnel
    restart: always
    command: tunnel --no-autoupdate --url http://api:8000 --metrics 0.0.0.0:2000
    healthcheck:
      test: ["NONE"]
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - app-network

  # ============================================================
  # FAZLE PERSONAL AI SYSTEM
  # Intelligence layer integrated with Dograh voice platform
  # ============================================================

  # ── Qdrant — Vector Database for Fazle Memory ─────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

  # ── Ollama — Local LLM Server ─────────────────────────────
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_KEEP_ALIVE: "10m"
      OLLAMA_HOST: "0.0.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network

  # ── Fazle API Gateway ──────────────────────────────────────
  fazle-api:
    build: ./fazle-system/api
    container_name: fazle-api
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      FAZLE_API_KEY: "${FAZLE_API_KEY:?FAZLE_API_KEY not set}"
      FAZLE_JWT_SECRET: "${FAZLE_JWT_SECRET:?FAZLE_JWT_SECRET not set}"
      FAZLE_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      FAZLE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_MEMORY_URL: "http://fazle-memory:8300"
      FAZLE_TASK_URL: "http://fazle-task-engine:8400"
      FAZLE_TOOLS_URL: "http://fazle-web-intelligence:8500"
      FAZLE_TRAINER_URL: "http://fazle-trainer:8600"
      FAZLE_LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY not set}"
      FAZLE_LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET not set}"
      FAZLE_LIVEKIT_URL: "${FAZLE_LIVEKIT_URL:-wss://livekit.iamazim.com}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      fazle-brain:
        condition: service_healthy
      fazle-memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
      - ai-network
      - db-network

  # ── Fazle Brain — Core Reasoning Engine ────────────────────
  fazle-brain:
    build: ./fazle-system/brain
    container_name: fazle-brain
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      LLM_PROVIDER: "${FAZLE_LLM_PROVIDER:-openai}"
      LLM_MODEL: "${FAZLE_LLM_MODEL:-gpt-4o}"
      OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-llama3.1}"
      MEMORY_URL: "http://fazle-memory:8300"
      TOOLS_URL: "http://fazle-web-intelligence:8500"
      TASK_URL: "http://fazle-task-engine:8400"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8200/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-network
      - db-network
      - app-network

  # ── Fazle Memory — Vector Memory System ────────────────────
  fazle-memory:
    build: ./fazle-system/memory
    container_name: fazle-memory
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      VECTOR_DB_URL: "http://qdrant:6333"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "text-embedding-3-small"
      COLLECTION_NAME: "fazle_memories"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-network
      - db-network
      - app-network

  # ── Fazle Task Engine — Scheduling & Automation ────────────
  fazle-task-engine:
    build: ./fazle-system/tasks
    container_name: fazle-task-engine
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      FAZLE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_MEMORY_URL: "http://fazle-memory:8300"
      FAZLE_DOGRAH_API_URL: "http://api:8000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8400/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── Fazle Web Intelligence — Search & Extraction ──────────
  fazle-web-intelligence:
    build: ./fazle-system/tools
    container_name: fazle-web-intelligence
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      SERPER_API_KEY: "${SERPER_API_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      SEARCH_PROVIDER: "${FAZLE_SEARCH_PROVIDER:-serper}"
      MEMORY_URL: "http://fazle-memory:8300"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8500/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-network
      - app-network

  # ── Fazle Trainer — Learning & Preference Extraction ──────
  fazle-trainer:
    build: ./fazle-system/trainer
    container_name: fazle-trainer
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      LLM_PROVIDER: "${FAZLE_LLM_PROVIDER:-openai}"
      LLM_MODEL: "${FAZLE_LLM_MODEL:-gpt-4o}"
      OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-llama3.1}"
      MEMORY_URL: "http://fazle-memory:8300"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/2"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8600/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── Fazle Voice Agent — LiveKit-based STT/TTS ─────────────
  fazle-voice:
    build: ./fazle-system/voice
    container_name: fazle-voice
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      LIVEKIT_URL: "ws://livekit:7880"
      FAZLE_VOICE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_VOICE_TTS_VOICE: "${FAZLE_VOICE_TTS_VOICE:-alloy}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      livekit:
        condition: service_healthy
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, signal; os.kill(1, 0)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
      - ai-network

  # ── Fazle UI — Next.js Dashboard ──────────────────────────
  fazle-ui:
    build: ./fazle-system/ui
    container_name: fazle-ui
    restart: always
    environment:
      FAZLE_API_URL: "http://fazle-api:8100"
      NEXTAUTH_URL: "${FAZLE_NEXTAUTH_URL:-https://fazle.iamazim.com}"
      NEXTAUTH_SECRET: "${FAZLE_JWT_SECRET:?FAZLE_JWT_SECRET not set}"
      PORT: "3020"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:3020:3020"
    depends_on:
      - fazle-api
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3020 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # ============================================================
  # MONITORING & OBSERVABILITY STACK
  # ============================================================

  # ── Prometheus — Metrics Collection ────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    restart: always
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-lifecycle"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-network
      - monitoring-network

  # ── Grafana — Dashboards & Visualization ───────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD not set}
      GF_SERVER_ROOT_URL: "https://iamazim.com/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:3030:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-network
      - monitoring-network

  # ── Node Exporter — Host Metrics ───────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: always
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)"
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring-network

  # ── cAdvisor — Container Metrics ───────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: always
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    networks:
      - monitoring-network

  # ── Loki — Log Aggregation ─────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./configs/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - monitoring-network

  # ── Promtail — Log Shipper ────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail
    restart: always
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./configs/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring-network

volumes:
  postgres_data:
  redis_data:
  minio-data:
    driver: local
  shared-tmp:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  app-network:
    driver: bridge
    name: app-network
  db-network:
    driver: bridge
    name: db-network
    internal: true
  ai-network:
    driver: bridge
    name: ai-network
    internal: true
  monitoring-network:
    driver: bridge
    name: monitoring-network
    internal: true
